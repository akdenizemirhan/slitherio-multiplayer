<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slither.io Multiplayer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; cursor: none; font-family: 'Segoe UI', Arial, sans-serif; }
        canvas { display: block; }
        #score {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            color: #fff; font-size: 24px; font-weight: bold;
            text-shadow: 0 0 10px rgba(0,0,0,0.8); z-index: 20; transition: text-shadow 0.3s;
        }
        #minimap {
            position: fixed; bottom: 20px; right: 20px; width: 180px; height: 180px;
            border: 2px solid rgba(255,255,255,0.3); border-radius: 8px;
            background: rgba(0,0,0,0.5); z-index: 20;
        }
        #leaderboard {
            position: fixed; top: 20px; right: 20px; color: #fff; font-size: 14px;
            background: rgba(0,0,0,0.5); padding: 12px 16px; border-radius: 8px;
            z-index: 20; min-width: 160px;
        }
        #leaderboard h3 { margin-bottom: 8px; text-align: center; font-size: 16px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 6px; }
        #leaderboard .entry { padding: 2px 0; display: flex; justify-content: space-between; }
        #leaderboard .entry.self { color: #0f0; font-weight: bold; }
        #online-count { position: fixed; top: 20px; left: 20px; color: rgba(255,255,255,0.6); font-size: 14px; z-index: 20; }
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a15 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; pointer-events: all;
        }
        #start-screen h1 { font-size: 72px; color: #0f0; text-shadow: 0 0 30px rgba(0,255,0,0.5); margin-bottom: 10px; letter-spacing: 4px; }
        #start-screen .subtitle { color: rgba(255,255,255,0.5); font-size: 16px; margin-bottom: 10px; }
        #start-screen .mp-badge { color: #0ff; font-size: 14px; margin-bottom: 30px; letter-spacing: 2px; }
        #nickname-input {
            padding: 14px 24px; font-size: 20px; border: 2px solid rgba(0,255,0,0.4);
            border-radius: 30px; background: rgba(255,255,255,0.1); color: #fff;
            text-align: center; outline: none; width: 300px; margin-bottom: 20px; transition: border-color 0.3s;
        }
        #nickname-input:focus { border-color: #0f0; }
        #nickname-input::placeholder { color: rgba(255,255,255,0.3); }
        #play-btn {
            padding: 16px 60px; font-size: 22px; border: none; border-radius: 30px;
            background: linear-gradient(135deg, #0f0, #0a0); color: #fff; cursor: pointer;
            font-weight: bold; letter-spacing: 2px; transition: transform 0.2s, box-shadow 0.2s; pointer-events: all;
        }
        #play-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(0,255,0,0.4); }
        #death-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100; pointer-events: all;
        }
        #death-screen h2 { font-size: 48px; color: #f44; margin-bottom: 10px; }
        #death-screen .final-score { font-size: 24px; color: #fff; margin-bottom: 30px; }
        #death-screen button {
            padding: 14px 50px; font-size: 20px; border: none; border-radius: 30px;
            background: linear-gradient(135deg, #0f0, #0a0); color: #fff; cursor: pointer;
            font-weight: bold; letter-spacing: 2px; transition: transform 0.2s;
        }
        #death-screen button:hover { transform: scale(1.05); }
        #boost-bar-container {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 200px; height: 8px; background: rgba(255,255,255,0.15); border-radius: 4px; z-index: 20;
        }
        #boost-bar { height: 100%; background: linear-gradient(90deg, #0f0, #0ff); border-radius: 4px; width: 100%; transition: width 0.1s; }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="score">Skor: 0</div>
    <canvas id="minimap"></canvas>
    <div id="leaderboard"><h3>Liderlik</h3></div>
    <div id="online-count"></div>
    <div id="boost-bar-container"><div id="boost-bar"></div></div>

    <div id="start-screen">
        <h1>SLITHER.IO</h1>
        <div class="subtitle">Yilan ol, buyuk ol, hayatta kal!</div>
        <div class="mp-badge">MULTIPLAYER</div>
        <input type="text" id="nickname-input" placeholder="Nickin ne?" maxlength="15">
        <button id="play-btn">OYNA</button>
    </div>

    <div id="death-screen">
        <h2>Oldin!</h2>
        <div class="final-score"></div>
        <button id="retry-btn">Tekrar Oyna</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
    // ============== SETUP ==============
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const minimapCanvas = document.getElementById('minimap');
    const minimapCtx = minimapCanvas.getContext('2d');
    const SEGMENT_SPACING = 12;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        minimapCanvas.width = 180;
        minimapCanvas.height = 180;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // ============== STATE ==============
    const socket = io();
    let CONFIG = {};
    let myId = null;
    let gameRunning = false;
    let playerNickname = 'Oyuncu';
    const serverSnakes = new Map();  // id -> server data (lightweight)
    const localSnakes = new Map();   // id -> { segments, ...renderData }
    const foodMap = new Map();
    let particles = [];
    let camera = { x: 0, y: 0, zoom: 1 };
    let mouseX = canvas.width / 2;
    let mouseY = canvas.height / 2;
    let mouseDown = false;
    let myAngle = 0;
    let mySpeed = 3.2;

    // ============== EASTER EGG ==============
    let spaceCount = 0;
    let spaceTimer = null;
    let beastMode = false;
    let coilTarget = null;

    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && gameRunning) {
            e.preventDefault();
            spaceCount++;
            if (spaceTimer) clearTimeout(spaceTimer);
            spaceTimer = setTimeout(() => { spaceCount = 0; }, 600);
            if (spaceCount >= 3) {
                beastMode = !beastMode;
                coilTarget = null;
                spaceCount = 0;
                const scoreEl = document.getElementById('score');
                scoreEl.style.textShadow = beastMode
                    ? '0 0 20px rgba(255,0,80,0.9), 0 0 40px rgba(255,0,80,0.4)'
                    : '0 0 10px rgba(0,0,0,0.8)';
            }
        }
    });

    // ============== BEAST MODE AI ==============
    function getBeastInput(me) {
        const mySegs = localSnakes.get(myId);
        if (!mySegs) return null;

        // Find nearest enemy that we can coil
        let bestTarget = null;
        let bestDist = Infinity;

        for (const [id, snake] of serverSnakes) {
            if (id === myId || !snake.alive) continue;
            const dx = snake.x - me.x;
            const dy = snake.y - me.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            // Coil condition: we are at least 1.5x longer AND within range
            if (me.len >= snake.len * 1.5 && dist < 500 && dist < bestDist) {
                bestDist = dist;
                bestTarget = snake;
            }
        }

        // If we have a valid coil target
        if (bestTarget) {
            coilTarget = bestTarget.id;
            const dx = bestTarget.x - me.x;
            const dy = bestTarget.y - me.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const angleToEnemy = Math.atan2(dy, dx);

            if (dist > 180) {
                // Phase 1: Approach fast
                return { angle: angleToEnemy, boosting: true };
            } else {
                // Phase 2: Coil! Circle around them clockwise
                // Tangent = angle to enemy + 90 degrees (clockwise orbit)
                const tangent = angleToEnemy + Math.PI / 2;
                // Pull inward slightly to tighten the coil
                const pullStrength = dist > 120 ? 0.15 : (dist > 80 ? 0 : -0.2);
                const finalAngle = tangent + pullStrength;
                return { angle: finalAngle, boosting: true };
            }
        }

        coilTarget = null;

        // No coil target - smart food collection
        // Prefer nearby food clusters and bigger food (from dead snakes)
        let bestFood = null;
        let bestScore = -Infinity;

        for (const food of foodMap.values()) {
            const dx = food.x - me.x;
            const dy = food.y - me.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > 800) continue;

            // Score: closer = better, bigger = better
            const score = (food.radius || 6) / Math.max(dist, 1) * 1000;
            if (score > bestScore) {
                bestScore = score;
                bestFood = food;
            }
        }

        if (bestFood) {
            return {
                angle: Math.atan2(bestFood.y - me.y, bestFood.x - me.x),
                boosting: false
            };
        }
        return null;
    }

    // ============== LOCAL SEGMENT TRACKING ==============
    function updateLocalSnake(id, data) {
        let local = localSnakes.get(id);

        if (!local) {
            // New snake - create segments from head
            const segs = [];
            for (let i = 0; i < data.len; i++) {
                segs.push({
                    x: data.x - Math.cos(data.angle) * i * SEGMENT_SPACING,
                    y: data.y - Math.sin(data.angle) * i * SEGMENT_SPACING,
                });
            }
            local = { segments: segs, targetX: data.x, targetY: data.y };
            localSnakes.set(id, local);
        } else {
            local.targetX = data.x;
            local.targetY = data.y;
        }

        // Adjust length
        while (local.segments.length < data.len) {
            const last = local.segments[local.segments.length - 1];
            local.segments.push({ x: last.x, y: last.y });
        }
        while (local.segments.length > data.len) {
            local.segments.pop();
        }
    }

    function tickLocalSegments() {
        for (const [id, local] of localSnakes) {
            if (id === myId) continue; // Own snake handled by prediction
            const head = local.segments[0];
            if (!head) continue;

            head.x += (local.targetX - head.x) * 0.35;
            head.y += (local.targetY - head.y) * 0.35;

            for (let i = 1; i < local.segments.length; i++) {
                const prev = local.segments[i - 1];
                const curr = local.segments[i];
                const dx = prev.x - curr.x;
                const dy = prev.y - curr.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > SEGMENT_SPACING) {
                    const ratio = SEGMENT_SPACING / dist;
                    curr.x = prev.x - dx * ratio;
                    curr.y = prev.y - dy * ratio;
                }
            }
        }
    }

    // ============== CLIENT-SIDE PREDICTION ==============
    function predictOwnSnake() {
        const local = localSnakes.get(myId);
        const data = serverSnakes.get(myId);
        if (!local || !data || !data.alive || local.segments.length === 0) return;

        // Calculate target angle
        let targetAngle;
        let boosting;
        if (beastMode) {
            const result = getBeastInput(data);
            if (result) { targetAngle = result.angle; boosting = result.boosting; }
            else { targetAngle = Math.atan2(mouseY - canvas.height / 2, mouseX - canvas.width / 2); boosting = mouseDown; }
        } else {
            targetAngle = Math.atan2(mouseY - canvas.height / 2, mouseX - canvas.width / 2);
            boosting = mouseDown;
        }

        // Turn smoothly
        let diff = targetAngle - myAngle;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        myAngle += Math.sign(diff) * Math.min(Math.abs(diff), 0.08);

        // Speed
        mySpeed = (boosting && data.boostEnergy > 0) ? 6 : 3.2;

        // Move head locally
        const head = local.segments[0];
        head.x += Math.cos(myAngle) * mySpeed;
        head.y += Math.sin(myAngle) * mySpeed;

        // Clamp to world bounds
        const halfWorld = (CONFIG.WORLD_SIZE || 5000) / 2 - 100;
        head.x = Math.max(-halfWorld, Math.min(halfWorld, head.x));
        head.y = Math.max(-halfWorld, Math.min(halfWorld, head.y));

        // Gentle server correction (keeps us in sync without snapping)
        head.x += (local.targetX - head.x) * 0.08;
        head.y += (local.targetY - head.y) * 0.08;

        // Body follows
        for (let i = 1; i < local.segments.length; i++) {
            const prev = local.segments[i - 1];
            const curr = local.segments[i];
            const dx = prev.x - curr.x;
            const dy = prev.y - curr.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > SEGMENT_SPACING) {
                const ratio = SEGMENT_SPACING / dist;
                curr.x = prev.x - dx * ratio;
                curr.y = prev.y - dy * ratio;
            }
        }

        // Camera follows predicted position (smooth)
        camera.x += (head.x - camera.x) * 0.12;
        camera.y += (head.y - camera.y) * 0.12;
        const targetZoom = Math.max(0.5, 1 - local.segments.length * 0.002);
        camera.zoom += (targetZoom - camera.zoom) * 0.03;
    }

    // ============== SOCKET EVENTS ==============
    socket.on('joined', (data) => {
        myId = data.id;
        CONFIG = data.config;
        gameRunning = true;
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('death-screen').style.display = 'none';
    });

    socket.on('foodSync', (foods) => {
        foodMap.clear();
        for (const f of foods) foodMap.set(f.id, f);
    });

    socket.on('state', (data) => {
        // Track which snakes are still present
        const activeIds = new Set();

        for (const snake of data.snakes) {
            activeIds.add(snake.id);
            serverSnakes.set(snake.id, snake);

            if (snake.alive) {
                updateLocalSnake(snake.id, snake);
            } else {
                localSnakes.delete(snake.id);
            }
        }

        // Remove disconnected snakes
        for (const id of serverSnakes.keys()) {
            if (!activeIds.has(id)) {
                serverSnakes.delete(id);
                localSnakes.delete(id);
            }
        }

        // Food delta
        if (data.eatenFoods) {
            for (const id of data.eatenFoods) {
                const food = foodMap.get(id);
                if (food) {
                    for (let p = 0; p < 3; p++) {
                        particles.push({
                            x: food.x, y: food.y,
                            vx: (Math.random() - 0.5) * 4, vy: (Math.random() - 0.5) * 4,
                            life: 0.5, color: food.color, radius: 3,
                        });
                    }
                }
                foodMap.delete(id);
            }
        }
        if (data.newFoods) {
            for (const f of data.newFoods) foodMap.set(f.id, f);
        }

        // Online count
        const playerCount = data.snakes.filter(s => !s.id.startsWith('bot_')).length;
        document.getElementById('online-count').textContent = playerCount + ' oyuncu online';
    });

    socket.on('died', (data) => {
        document.getElementById('death-screen').style.display = 'flex';
        document.querySelector('#death-screen .final-score').textContent =
            'Skor: ' + data.score + ' | Uzunluk: ' + data.length;
        beastMode = false;
        coilTarget = null;
        document.getElementById('score').style.textShadow = '0 0 10px rgba(0,0,0,0.8)';
    });

    // ============== INPUT ==============
    canvas.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
    canvas.addEventListener('mousedown', () => { mouseDown = true; });
    canvas.addEventListener('mouseup', () => { mouseDown = false; });
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); mouseDown = true; mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; });
    canvas.addEventListener('touchend', () => { mouseDown = false; });

    // Send predicted input to server
    setInterval(() => {
        if (!gameRunning) return;
        const me = serverSnakes.get(myId);
        if (!me || !me.alive) return;

        let boosting;
        if (beastMode) {
            const result = getBeastInput(me);
            boosting = result ? result.boosting : mouseDown;
        } else {
            boosting = mouseDown;
        }

        socket.emit('input', { angle: myAngle, boosting });
    }, 1000 / 30);

    // ============== BUTTONS ==============
    document.getElementById('play-btn').addEventListener('click', () => {
        const input = document.getElementById('nickname-input').value.trim();
        if (input) playerNickname = input;
        socket.emit('join', { nickname: playerNickname });
    });
    document.getElementById('nickname-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('play-btn').click();
    });
    document.getElementById('retry-btn').addEventListener('click', () => {
        socket.emit('respawn', { nickname: playerNickname });
        gameRunning = true;
        document.getElementById('death-screen').style.display = 'none';
    });

    // ============== DRAWING ==============
    function drawGrid() {
        const gridSize = 50;
        const startX = Math.floor((camera.x - canvas.width / 2 / camera.zoom) / gridSize) * gridSize;
        const startY = Math.floor((camera.y - canvas.height / 2 / camera.zoom) / gridSize) * gridSize;
        const endX = camera.x + canvas.width / 2 / camera.zoom;
        const endY = camera.y + canvas.height / 2 / camera.zoom;
        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        ctx.lineWidth = 1;
        for (let x = startX; x <= endX; x += gridSize) {
            const sx = (x - camera.x) * camera.zoom + canvas.width / 2;
            ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, canvas.height); ctx.stroke();
        }
        for (let y = startY; y <= endY; y += gridSize) {
            const sy = (y - camera.y) * camera.zoom + canvas.height / 2;
            ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(canvas.width, sy); ctx.stroke();
        }
    }

    function drawBoundary() {
        const half = CONFIG.WORLD_SIZE / 2;
        if (!half) return;
        ctx.strokeStyle = 'rgba(255, 50, 50, 0.6)';
        ctx.lineWidth = 4 * camera.zoom;
        const x = (-half - camera.x) * camera.zoom + canvas.width / 2;
        const y = (-half - camera.y) * camera.zoom + canvas.height / 2;
        ctx.strokeRect(x, y, CONFIG.WORLD_SIZE * camera.zoom, CONFIG.WORLD_SIZE * camera.zoom);
    }

    function drawFoods() {
        const time = Date.now() / 1000;
        for (const food of foodMap.values()) {
            const sx = (food.x - camera.x) * camera.zoom + canvas.width / 2;
            const sy = (food.y - camera.y) * camera.zoom + canvas.height / 2;
            if (sx < -20 || sx > canvas.width + 20 || sy < -20 || sy > canvas.height + 20) continue;
            const r = (food.radius || 6) * camera.zoom;
            const pulse = 1 + Math.sin(time * 3 + food.x) * 0.2;
            ctx.beginPath();
            ctx.arc(sx, sy, r * pulse * 2, 0, Math.PI * 2);
            ctx.fillStyle = food.color + '20';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(sx, sy, r * pulse, 0, Math.PI * 2);
            ctx.fillStyle = food.color;
            ctx.fill();
        }
    }

    function drawSnake(id) {
        const data = serverSnakes.get(id);
        const local = localSnakes.get(id);
        if (!data || !data.alive || !local || local.segments.length === 0) return;

        const radius = (12 + Math.min(local.segments.length * 0.15, 12)) * camera.zoom;
        const isCoilTarget = beastMode && coilTarget === id;

        for (let i = local.segments.length - 1; i >= 0; i--) {
            const seg = local.segments[i];
            const sx = (seg.x - camera.x) * camera.zoom + canvas.width / 2;
            const sy = (seg.y - camera.y) * camera.zoom + canvas.height / 2;
            if (sx < -radius * 2 || sx > canvas.width + radius * 2 || sy < -radius * 2 || sy > canvas.height + radius * 2) continue;

            const colorIdx = i % data.colors.length;

            // Glow (red pulse for coil target)
            ctx.beginPath();
            ctx.arc(sx, sy, radius + 4 * camera.zoom, 0, Math.PI * 2);
            if (isCoilTarget) {
                const pulse = 0.3 + Math.sin(Date.now() / 100) * 0.2;
                ctx.fillStyle = `rgba(255,0,0,${pulse})`;
            } else {
                ctx.fillStyle = data.colors[colorIdx] + '30';
            }
            ctx.fill();

            ctx.beginPath();
            ctx.arc(sx, sy, radius, 0, Math.PI * 2);
            ctx.fillStyle = data.colors[colorIdx];
            ctx.fill();

            ctx.beginPath();
            ctx.arc(sx - radius * 0.25, sy - radius * 0.25, radius * 0.4, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.fill();
        }

        // Eyes
        const head = local.segments[0];
        const hx = (head.x - camera.x) * camera.zoom + canvas.width / 2;
        const hy = (head.y - camera.y) * camera.zoom + canvas.height / 2;
        const eyeOffset = radius * 0.45;
        const eyeR = radius * 0.35;
        const pupilR = radius * 0.18;
        const eyeAngle = data.angle;

        for (let side = -1; side <= 1; side += 2) {
            const ex = hx + Math.cos(eyeAngle + side * 0.5) * eyeOffset;
            const ey = hy + Math.sin(eyeAngle + side * 0.5) * eyeOffset;
            ctx.beginPath(); ctx.arc(ex, ey, eyeR, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill();
            ctx.beginPath();
            ctx.arc(ex + Math.cos(eyeAngle) * pupilR * 0.5, ey + Math.sin(eyeAngle) * pupilR * 0.5, pupilR, 0, Math.PI * 2);
            ctx.fillStyle = '#111'; ctx.fill();
        }

        // Name
        const isMe = id === myId;
        ctx.fillStyle = isMe ? '#0f0' : '#fff';
        ctx.font = `bold ${14 * camera.zoom}px 'Segoe UI', Arial`;
        ctx.textAlign = 'center';
        ctx.fillText(data.name, hx, hy - radius - 10 * camera.zoom);

        // Beast mode indicator on self
        if (isMe && beastMode) {
            ctx.font = `bold ${10 * camera.zoom}px monospace`;
            ctx.fillStyle = 'rgba(255,0,80,0.8)';
            ctx.fillText('\u26A1', hx, hy - radius - 24 * camera.zoom);
        }
    }

    function drawParticles() {
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx; p.y += p.vy;
            p.life -= 0.03; p.vx *= 0.95; p.vy *= 0.95;
            if (p.life <= 0) { particles.splice(i, 1); continue; }
            const sx = (p.x - camera.x) * camera.zoom + canvas.width / 2;
            const sy = (p.y - camera.y) * camera.zoom + canvas.height / 2;
            ctx.globalAlpha = p.life;
            ctx.beginPath();
            ctx.arc(sx, sy, p.radius * camera.zoom, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();
        }
        ctx.globalAlpha = 1;
    }

    function drawMinimap() {
        const me = serverSnakes.get(myId);
        if (!me || !me.alive || !CONFIG.WORLD_SIZE) return;
        const mCtx = minimapCtx;
        const mw = 180, mh = 180;
        const scale = mw / CONFIG.WORLD_SIZE;
        mCtx.clearRect(0, 0, mw, mh);
        mCtx.fillStyle = 'rgba(0,0,0,0.6)';
        mCtx.fillRect(0, 0, mw, mh);
        mCtx.strokeStyle = 'rgba(255,255,255,0.15)';
        mCtx.strokeRect(0, 0, mw, mh);

        for (const [id, snake] of serverSnakes) {
            if (!snake.alive) continue;
            const bx = (snake.x + CONFIG.WORLD_SIZE / 2) * scale;
            const by = (snake.y + CONFIG.WORLD_SIZE / 2) * scale;
            const isMe = id === myId;
            mCtx.beginPath();
            mCtx.arc(bx, by, isMe ? 4 : 2, 0, Math.PI * 2);
            mCtx.fillStyle = isMe ? '#0f0' : (snake.colors ? snake.colors[0] + '80' : '#fff');
            mCtx.fill();
        }

        const vw = (canvas.width / camera.zoom) * scale;
        const vh = (canvas.height / camera.zoom) * scale;
        const px = (me.x + CONFIG.WORLD_SIZE / 2) * scale;
        const py = (me.y + CONFIG.WORLD_SIZE / 2) * scale;
        mCtx.strokeStyle = 'rgba(255,255,255,0.4)';
        mCtx.lineWidth = 1;
        mCtx.strokeRect(px - vw / 2, py - vh / 2, vw, vh);
    }

    let lastLeaderboard = 0;
    function updateLeaderboard() {
        const sorted = [...serverSnakes.values()].filter(s => s.alive).sort((a, b) => b.score - a.score).slice(0, 10);
        const container = document.getElementById('leaderboard');
        while (container.children.length > 1) container.removeChild(container.lastChild);
        sorted.forEach((snake, i) => {
            const entry = document.createElement('div');
            entry.className = snake.id === myId ? 'entry self' : 'entry';
            const dot = document.createElement('span');
            dot.style.color = snake.colors ? snake.colors[0] : '#fff';
            dot.textContent = '\u25CF ' + (i + 1) + '. ' + snake.name;
            const sc = document.createElement('span');
            sc.textContent = snake.score;
            entry.appendChild(dot);
            entry.appendChild(sc);
            container.appendChild(entry);
        });
    }

    function updateUI() {
        const me = serverSnakes.get(myId);
        if (me && me.alive) {
            const modeText = beastMode ? ' | \u26A1' : '';
            document.getElementById('score').textContent = 'Skor: ' + me.score + ' | Uzunluk: ' + me.len + modeText;
            document.getElementById('boost-bar').style.width = me.boostEnergy + '%';
        }
    }

    // ============== GAME LOOP ==============
    function gameLoop(timestamp) {
        ctx.fillStyle = '#0a0a15';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (gameRunning) {
            predictOwnSnake();
            tickLocalSegments();
            drawGrid();
            drawBoundary();
            drawFoods();

            // Draw others first, self on top
            for (const id of serverSnakes.keys()) {
                if (id !== myId) drawSnake(id);
            }
            drawSnake(myId);

            drawParticles();
            drawMinimap();
            updateUI();

            if (timestamp - lastLeaderboard > 1000) {
                updateLeaderboard();
                lastLeaderboard = timestamp;
            }
        }

        // Cursor
        ctx.beginPath();
        ctx.arc(mouseX, mouseY, 6, 0, Math.PI * 2);
        ctx.strokeStyle = beastMode ? 'rgba(255,0,80,0.8)' : 'rgba(255,255,255,0.6)';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(mouseX, mouseY, 2, 0, Math.PI * 2);
        ctx.fillStyle = beastMode ? '#ff0050' : '#fff';
        ctx.fill();

        requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(gameLoop);
    document.getElementById('nickname-input').focus();
    </script>
</body>
</html>
